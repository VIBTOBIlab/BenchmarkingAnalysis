name: Render R Markdown Notebooks

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4.1'

      - name: Install R packages
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            tidyverse
            dplyr
            tidyr
            stringr
            ggplot2
            ggpubr
            patchwork
            pROC
            devtools
            knitr
            rmarkdown
            remotes
            funkyheatmap
            svglite
            tidytext
            bioc::ComplexHeatmap
            bioc::circlize

      - name: Render all Rmd notebooks
        run: |
          Rscript -e '
            files <- list.files("notebooks", pattern = "\\.Rmd$", full.names = TRUE)
            for (f in files) {
              message("Rendering ", f)
              rmarkdown::render(f, output_dir = "notebook")
            }
          '
