name: Render R Markdown Notebooks

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up micromamba
        uses: mamba-org/setup-micromamba@v1
        with:
          environment-file: environment.yml
          cache-environment: true
          cache-downloads: true

      - name: Render all Rmd notebooks
        run: |
          eval "$(micromamba shell hook --shell=bash)"
          micromamba activate test-notebooks
          Rscript -e '
            files <- list.files("notebooks", pattern = "\\.Rmd$", full.names = TRUE)
            for (f in files) {
              message("Rendering ", f)
              rmarkdown::render(f, output_dir = "notebook")
            }
          '
